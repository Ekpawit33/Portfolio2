<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการศึกษา - นายเอกภวิทย์  กาญจนา</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-family: 'Kanit', sans-serif; color: #1e3a8a; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .info-group { margin-bottom: 25px; font-size: 1.1rem; border-left: 3px solid #3b82f6; padding-left: 15px; }
        .info-label { font-weight: 600; color: #1e3a8a; display: block; margin-bottom: 5px; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; background-color: #3b82f6; color: #fff; text-decoration: none; border-radius: 8px; font-family: 'Kanit', sans-serif; transition: background 0.3s; }
        .back-btn:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

    <div class="container">
        <h1><i class="fa-solid fa-graduation-cap"></i> ประวัติการศึกษา (Education)</h1>
        
        <div class="info-group">
            <span class="info-label">ระดับมัธยมศึกษาตอนปลาย (ปีการศึกษา 2567 - 2569)</span>
            <span>โรงเรียนพานทอง</span>
        </div>
        
        <div class="info-group">
            <span class="info-label">ระดับมัธยมศึกษาตอนต้น (ปีการศึกษา 2564 - 2566)</span>
            <span>โรงเรียนวัฒนานุศาสน์</span>
        </div>
        
        <div class="info-group">
            <span class="info-label">ระดับประถมศึกษา (ปีการศึกษา 2558 - 2563)</span>
            <span>โรงเรียนอนุบาลพนัสศึกษาลัย</span>
        </div>

        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> กลับหน้าแรก</a>
    </div>

</body>
</html>
